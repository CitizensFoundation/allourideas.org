version: '3.9'

x-your-priorities-app-common: &your-priorities-app-common
  #  build: ./your-priorities-app/
  build:
    context: ../../.
    dockerfile: api/deployment/your-priorities-app/Dockerfile
  env_file: .env
  environment:
   # - FORCE_DB_SYNC=true
  restart: always
  image: your-priorities-app:current
  command: node ts-out/server.js
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:9080/api/users/has/AutoTranslation"]
    interval: 30s
    timeout: 20s
    retries: 3
  network_mode: host
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "500m"

x-your-priorities-worker-common: &your-priorities-worker-common
  #build: ./your-priorities-worker/
  build:
    context: ../../.
    dockerfile: api/deployment/your-priorities-worker/Dockerfile
  restart: always
  env_file: .env
  command: node node_modules/@yrpri/api/services/workers/main.cjs
  network_mode: host
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "500m"

services:
  webserver:
    container_name: webserver
    restart: always
    env_file: .env
    build:
      context: ./webserver_reverse_proxy/
      dockerfile: Dockerfile
    #ports:
    #  - "80:80"
    #  - "443:443"
    volumes:
      - ./webserver_reverse_proxy/templates:/etc/nginx/templates
    healthcheck:
      test: ["CMD", "curl", "-f", "https://${FULL_HOSTNAME}/api/users/has/AutoTranslation"]
      interval: 30s
      timeout: 20s
      retries: 3
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "500m"

  your-priorities-app1:
    <<: *your-priorities-app-common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/api/users/has/AutoTranslation"]
    environment:
      - PORT=9080

  your-priorities-worker:
    <<: *your-priorities-worker-common

  pairwise-api:
    container_name: pairwise-api
    restart: always
    env_file: .pairwise-env
    build:
      context: ./pairwise-api/
      dockerfile: Dockerfile
    ports:
      - "3072:3072"
    volumes:
      - pairwise-api:/home
#      - bundle-data:/home/app/pairwise-api/vendor/bundle
    healthcheck:
      test: ["CMD", "curl", "-f", "http://${FULL_HOSTNAME}:3072/"]
      interval: 30s
      timeout: 20s
      retries: 3
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "500m"

  redis:
    image: redis:6.2.14-alpine
    container_name: redis
    restart: always
    network_mode: host
    ports:
      - '6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis:/data

  pairwise-api-worker:
    container_name: pairwise-api-worker
    restart: always
    env_file: .pairwise-env
    build:
      context: ./pairwise-api/
      dockerfile: Dockerfile
    command: bash -c "bundle exec rake jobs:work"
    working_dir: /home/app/pairwise-api
    volumes:
      - pairwise-api:/home
    network_mode: host
    depends_on:
      - pairwise-api
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "500m"

volumes:
  pairwise-api:
    driver: local
  redis:
    driver: local
